<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2563f0"/>
      <stop offset="100%" stop-color="#1a3fd4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" ry="44" fill="url(#bg)"/>

  <!-- Subtle highlight -->
  <ellipse cx="62" cy="50" rx="74" ry="54" fill="white" opacity="0.07"/>

  <!-- ARES text -->
  <text x="100" y="118"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="'Arial Black','Arial Bold',Arial,sans-serif"
        font-weight="900"
        font-size="54"
        letter-spacing="-1"
        fill="white">ARES</text>

  <!-- 4-pointed sparkle -->
  <g transform="translate(158, 158)">
    <path d="M0,-7 L1,-1 L7,0 L1,1 L0,7 L-1,1 L-7,0 L-1,-1 Z"
          fill="white" opacity="0.90"/>
  </g>
</svg>
